<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 레이더 — IT/SW 공모전 모아보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6bff;
      --accent2: #ff6b9d;
      --accent3: #6bffda;
      --text: #e8e8f0;
      --muted: #6b6b82;
      --card-hover: #1e1e2e;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 노이즈 그라디언트 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,107,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,107,157,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ──── 헤더 ──── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 16px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo span {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      -webkit-text-fill-color: var(--muted);
      letter-spacing: 0.5px;
      display: block;
      margin-top: -6px;
    }

    /* 검색 */
    .search-wrap {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* ──── 필터 바 ──── */
    .filter-bar {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ──── 메인 ──── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* 통계 바 */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.accent2 { color: var(--accent2); }
    .stat-value.accent3 { color: var(--accent3); }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    .last-updated {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* 카드 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      border-color: rgba(124,107,255,0.4);
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124,107,255,0.12);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    /* 카테고리 뱃지 */
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-algorithm  { background: rgba(52,152,219,0.15); color: #3498db; }
    .badge-hackathon  { background: rgba(231,76,60,0.15);  color: #e74c3c; }
    .badge-ai_ml      { background: rgba(155,89,182,0.15); color: #9b59b6; }
    .badge-web_mobile { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .badge-game       { background: rgba(243,156,18,0.15); color: #f39c12; }
    .badge-security   { background: rgba(26,188,156,0.15); color: #1abc9c; }
    .badge-data       { background: rgba(52,73,94,0.4);    color: #7f8c8d; }
    .badge-iot        { background: rgba(230,126,34,0.15); color: #e67e22; }
    .badge-sw_general { background: rgba(41,128,185,0.15); color: #2980b9; }
    .badge-other      { background: rgba(149,165,166,0.15);color: #95a5a6; }

    /* D-day 뱃지 */
    .dday {
      font-size: 11px;
      font-weight: 700;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .dday-urgent   { background: rgba(231,76,60,0.2);  color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .dday-warning  { background: rgba(243,156,18,0.2); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); }
    .dday-safe     { background: rgba(46,204,113,0.15);color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .dday-ended    { background: rgba(149,165,166,0.1);color: var(--muted); border: 1px solid var(--border); }

    /* 카드 타이틀 */
    .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 카드 메타 */
    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-row svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .meta-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 카드 푸터 */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .source-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
    }

    /* 빈 상태 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 80px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--text); }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .modal-field-value {
      font-size: 14px;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.2s;
      width: 100%;
      justify-content: center;
    }

    .modal-link:hover { opacity: 0.85; }

    /* 애니메이션 */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 반응형 */
    @media (max-width: 640px) {
      .header-inner { height: auto; padding: 12px 0; flex-wrap: wrap; }
      .logo span { display: none; }
      .tabs { font-size: 11px; }
      .tab-btn { padding: 5px 10px; }
      main { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 16px; }
      .last-updated { display: none; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <div class="logo">
      CONTEST RADAR
      <span>IT/SW 공모전 모아보기</span>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="공모전 검색..." />
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="active">진행중</button>
      <button class="tab-btn" data-tab="completed">마감</button>
      <button class="tab-btn" data-tab="all">전체</button>
    </div>
  </div>
</header>

<!-- 필터 바 -->
<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">분류</span>
    <button class="chip active" data-cat="all">전체</button>
    <button class="chip" data-cat="ai_ml">AI/ML</button>
    <button class="chip" data-cat="hackathon">해커톤</button>
    <button class="chip" data-cat="algorithm">알고리즘</button>
    <button class="chip" data-cat="web_mobile">웹/모바일</button>
    <button class="chip" data-cat="data">데이터</button>
    <button class="chip" data-cat="game">게임</button>
    <button class="chip" data-cat="security">보안</button>
    <button class="chip" data-cat="iot">IoT</button>
    <button class="chip" data-cat="sw_general">SW 일반</button>
    <button class="chip" data-cat="other">기타</button>
  </div>
</div>

<!-- 메인 -->
<main>
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat-item">
      <div class="stat-value accent" id="statActive">0</div>
      <div class="stat-label">진행중</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value accent2" id="statTotal">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value accent3" id="statShown">0</div>
      <div class="stat-label">표시중</div>
    </div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>공모전 데이터 불러오는 중...</div>
  </div>

  <div class="grid" id="grid"></div>
</main>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const CATEGORY_LABELS = {
  algorithm: "알고리즘", hackathon: "해커톤", ai_ml: "AI/ML",
  web_mobile: "웹/모바일", game: "게임", security: "보안",
  data: "데이터", iot: "IoT", sw_general: "SW 일반", other: "기타",
};

const SOURCE_LABELS = {
  dacon: "데이콘", wevity: "위비티", linkareer: "링커리어",
  thinkcontest: "씽굿", contestkorea: "컨테스트코리아",
};

let allContests = [];
let currentTab = "active";
let currentCat = "all";
let currentSearch = "";

// D-day 계산
function calcDday(deadline) {
  if (!deadline) return { text: "미정", cls: "dday-safe" };
  const diff = Math.ceil((new Date(deadline) - new Date()) / 86400000);
  if (diff < 0) return { text: `D+${Math.abs(diff)}`, cls: "dday-ended" };
  if (diff === 0) return { text: "D-DAY 🔥", cls: "dday-urgent" };
  if (diff <= 7)  return { text: `D-${diff}`, cls: "dday-urgent" };
  if (diff <= 30) return { text: `D-${diff}`, cls: "dday-warning" };
  return { text: `D-${diff}`, cls: "dday-safe" };
}

function formatDate(d) {
  if (!d) return "미정";
  const [y, m, day] = d.split("-");
  return `${y}. ${parseInt(m)}. ${parseInt(day)}.`;
}

function renderCard(c, delay) {
  const dday = calcDday(c.deadline);
  const catLabel = CATEGORY_LABELS[c.category] || "기타";
  const srcLabel = SOURCE_LABELS[c.source] || c.source;
  const tags = (c.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join("");

  return `
    <a href="#" class="card" style="animation-delay:${delay}ms"
       data-id="${c.id}" onclick="openModal('${c.id}'); return false;">
      <div class="card-header">
        <span class="badge badge-${c.category || 'other'}">${catLabel}</span>
        <span class="dday ${dday.cls}">${dday.text}</span>
      </div>
      <div class="card-title">${escHtml(c.title)}</div>
      <div class="card-meta">
        ${c.organizer ? `
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l2-4h14l2 4"/>
          </svg>
          <span>${escHtml(c.organizer)}</span>
        </div>` : ""}
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span>마감 ${formatDate(c.deadline)}</span>
        </div>
        ${c.prize ? `
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
          <span>${escHtml(c.prize)}</span>
        </div>` : ""}
      </div>
      <div class="card-footer">
        <span class="source-label">${srcLabel}</span>
        <div class="tags">${tags}</div>
      </div>
    </a>
  `;
}

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function getFiltered() {
  return allContests.filter(c => {
    if (currentTab === "active" && c.status !== "active") return false;
    if (currentTab === "completed" && c.status !== "completed") return false;
    if (currentCat !== "all" && c.category !== currentCat) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      const haystack = [c.title, c.organizer, c.prize, ...(c.tags||[])].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById("grid");

  document.getElementById("statShown").textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">조건에 맞는 공모전이 없습니다</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((c, i) => renderCard(c, Math.min(i * 30, 300))).join("");
}

function openModal(id) {
  const c = allContests.find(x => x.id === id);
  if (!c) return;
  const dday = calcDday(c.deadline);
  const catLabel = CATEGORY_LABELS[c.category] || "기타";
  const srcLabel = SOURCE_LABELS[c.source] || c.source;

  document.getElementById("modalTitle").textContent = c.title;
  document.getElementById("modalBody").innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
      <span class="badge badge-${c.category || 'other'}">${catLabel}</span>
      <span class="dday ${dday.cls}">${dday.text}</span>
    </div>
    ${c.organizer ? `<div class="modal-field"><div class="modal-field-label">주최</div><div class="modal-field-value">${escHtml(c.organizer)}</div></div>` : ""}
    <div class="modal-field"><div class="modal-field-label">마감일</div><div class="modal-field-value">${formatDate(c.deadline)}</div></div>
    ${c.startDate && c.startDate !== c.deadline ? `<div class="modal-field"><div class="modal-field-label">시작일</div><div class="modal-field-value">${formatDate(c.startDate)}</div></div>` : ""}
    ${c.prize ? `<div class="modal-field"><div class="modal-field-label">시상</div><div class="modal-field-value" style="color:var(--accent3);font-weight:600;">${escHtml(c.prize)}</div></div>` : ""}
    ${c.description ? `<div class="modal-field"><div class="modal-field-label">설명</div><div class="modal-field-value" style="color:var(--muted);line-height:1.7;">${escHtml(c.description)}</div></div>` : ""}
    ${(c.tags||[]).length ? `<div class="modal-field"><div class="modal-field-label">태그</div><div class="tags" style="justify-content:flex-start;margin-top:4px;">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div></div>` : ""}
    <div class="modal-field"><div class="modal-field-label">출처</div><div class="modal-field-value">${srcLabel}</div></div>
    ${c.url ? `<a href="${escHtml(c.url)}" target="_blank" rel="noopener" class="modal-link">
      공모전 바로가기
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>` : ""}
  `;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

// 이벤트 바인딩
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    render();
  });
});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    currentCat = chip.dataset.cat;
    render();
  });
});

let searchTimer;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    render();
  }, 200);
});

// 데이터 로드
async function loadData() {
  try {
    const resp = await fetch("contests.json?" + Date.now());
    if (!resp.ok) throw new Error("fetch failed");
    const data = await resp.json();
    allContests = data.contests || [];

    const active = allContests.filter(c => c.status === "active").length;
    document.getElementById("statActive").textContent = active;
    document.getElementById("statTotal").textContent = allContests.length;
    document.getElementById("statShown").textContent = active;

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById("lastUpdated").textContent =
        `마지막 업데이트: ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("statsBar").style.display = "flex";
    render();
  } catch (e) {
    document.getElementById("loading").innerHTML = `
      <div style="color:#e74c3c;font-size:16px;">⚠️ 데이터를 불러올 수 없습니다</div>
      <div style="color:var(--muted);margin-top:8px;font-size:13px;">contests.json 파일을 확인해주세요</div>
    `;
  }
}

loadData();
</script>
</body>
</html>
